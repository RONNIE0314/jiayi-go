<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIAYI GO - 精选活动</title>
    <style>
        /* 基础设置：深色背景，模仿你原本的网页风格 */
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #0a0e17; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-logo {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 40px;
            color: #9d7dfa; /* 模仿截图中的紫色 */
        }

        /* 卡片容器布局 */
        .events-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }

        /* 卡片整体：白色背景确保文字可见 */
        .event-card {
            width: 350px;
            background: #ffffff;
            border-radius: 15px;
            overflow: hidden;
            text-decoration: none;
            color: #333; 
            border: 2px solid #ff4d6d; /* 亮粉色边框 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .event-card:hover {
            transform: translateY(-10px);
        }

        /* 图片区域 */
        .card-banner {
            height: 180px;
            width: 100%;
            overflow: hidden;
            background-color: #222;
        }

        .card-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 文字信息区域 */
        .card-info {
            padding: 20px;
            background: white;
        }

        /* 重点：强制标题为黑色，绝对清晰 */
        .card-info h3 {
            margin: 0 0 12px 0;
            font-size: 1.4rem;
            color: #000000 !important;
            font-weight: 700;
        }

        .card-info p {
            margin: 6px 0;
            font-size: 0.95rem;
            color: #555;
            display: flex;
            align-items: center;
        }

        .icon {
            margin-right: 10px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="header-logo">JIAYI GO</div>

    <div class="events-grid">
        
        <a href="#" class="event-card">
            <div class="card-banner">
                <img src="https://via.placeholder.com/400x200/1a1a3a/ffffff?text=UPEI+FALL+TOURNEY" alt="UPEI">
            </div>
            <div class="card-info">
                <h3>UPEI Fall Tourney 2026</h3> <p><span class="icon">📅</span> October 12, 2026</p>
                <p><span class="icon">📍</span> Charlottetown, PEI</p>
            </div>
        </a>

        <a href="#" class="event-card">
            <div class="card-banner">
                <img src="https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=800&q=80" alt="Go Camp">
            </div>
            <div class="card-info">
                <h3>2026 CGA Summer Camp</h3>
                <p><span class="icon">📅</span> August 23, 2026</p>
                <p><span class="icon">📍</span> Jouvence resort, Canada</p>
            </div>
        </a>

    </div>

</body>
</html>
